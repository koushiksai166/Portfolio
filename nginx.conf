# Use this absolute path: d:\Koushik\Portfolio\nginx.conf
# Nginx configuration for single-page applications (React, Vue, Angular, etc.)

server {
    # Listen on port 80 (standard HTTP port)
    listen 80;
    
    # Define the server name (replace with your domain if you have one)
    server_name localhost;
    
    # Root directory where Nginx will serve files from
    root /usr/share/nginx/html;
    
    # Default index file
    index index.html index.htm;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Security headers to protect your site
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (CSS, JS, images, fonts) for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle SPA routing - This is CRITICAL for React/Vue/Angular apps
    # All routes go to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}